spring.datasource.url=jdbc:h2:mem:store_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql

app.jwt.secret=test-secret-key-for-jwt-signing-1234567890
app.jwt.expire-seconds=3600
app.upload.avatar-dir=target/test-uploads/avatars
